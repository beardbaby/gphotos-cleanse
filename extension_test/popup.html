<!DOCTYPE html>
<html>
<body style="width:250px; padding:12px; font-family:sans-serif">
  <h3 style="margin:0 0 8px">Delete Photo</h3>
  <input id="filename" type="text" placeholder="e.g. IMG_1234.jpg"
    style="width:100%; box-sizing:border-box; padding:6px; margin-bottom:8px" />
  <button id="deleteBtn" style="width:100%; padding:8px; background:#d93025; color:white; border:none; cursor:pointer; border-radius:4px">
    Find & Delete
  </button>
  <p id="status" style="font-size:12px; margin-top:8px; color:#555"></p>

  <script src="popup.js"></script>
</body>
</html>
