<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FBF7F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1815" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Find and remove duplicate photos from your Google Photos library."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Apply the saved/system theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) { /* ignore */ }
      })();
    </script>

    <title>Duplicate Finder</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Deletion helper (Chrome extension) id. Pinned via the "key" field in the
         extension's manifest.json, so it's identical for every user. Single
         source of truth read by the app. -->
    <script>
    window.EXTENSION_ID = 'cbccbicdjdhcfdmdahhloijcnlfpjjlf';
    </script>
  </body>
</html>
